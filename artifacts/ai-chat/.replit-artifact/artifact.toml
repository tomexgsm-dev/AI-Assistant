kind = "web"
previewPath = "/"
title = "AI Chat Assistant"
version = "1.0.0"
id = "artifacts/ai-chat"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 25374
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/ai-chat run dev"

[services.env]
PORT = "25374"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/ai-chat", "run", "build"]
publicDir = "artifacts/ai-chat/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
